name: Build and Release Manuscript PDF

on:
  push:
    paths:
      - 'manuscript/**'
      - 'outputs/figures/**'

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: manuscript
          root_file: main.tex
          latexmk_use_xelatex: false

      - name: Rename PDF
        run: mv manuscript/main.pdf manuscript/wu_hrv_ecg_analysis.pdf

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: manuscript-pdf
          path: manuscript/wu_hrv_ecg_analysis.pdf

      - name: Update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Manuscript
          body: Auto-built from the latest commit on `main`.
          files: manuscript/wu_hrv_ecg_analysis.pdf
          make_latest: true
